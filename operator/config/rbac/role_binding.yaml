apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: marathonrunner-operator-rolebinding
  labels:
    app.kubernetes.io/name: marathonrunner-operator
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: marathonrunner-operator-role
subjects:
  - kind: ServiceAccount
    name: marathonrunner-operator-controller-manager
    namespace: marathonrunner-system
