apiVersion: v1
kind: Namespace
metadata:
  name: marathonrunner-system
  labels:
    control-plane: marathonrunner-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marathonrunner-operator-controller-manager
  namespace: marathonrunner-system
  labels:
    control-plane: marathonrunner-operator
    app.kubernetes.io/name: marathonrunner-operator
    app.kubernetes.io/component: controller
spec:
  selector:
    matchLabels:
      control-plane: marathonrunner-operator
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: marathonrunner-operator
    spec:
      serviceAccountName: marathonrunner-operator-controller-manager
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: marathonrunner-operator:latest
          command:
            - /manager
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      securityContext:
        runAsNonRoot: true
