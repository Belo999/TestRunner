apiVersion: marathonrunner.io/v1alpha1
kind: TestRun
metadata:
  name: run-1-sample
  namespace: marathonrunner-execution
  labels:
    project: "sample-project"
    scenario: "smoke-test"
spec:
  runId: 1
  engine: k6
  targetEndpoint: https://httpbin.org
  targetVusers: 10
  durationMinutes: 1
  loadProfile: constant
  scriptConfigMap: run-1-scripts
  namespace: marathonrunner-execution
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  retentionMinutes: 30
